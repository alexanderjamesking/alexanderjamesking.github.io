<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} &mdash; {{ .Site.Title }}{{ end }}</title>
{{ with .Description }}<meta name="description" content="{{ . }}" />{{ end }}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "/style.css" | relURL }}">
</head>
<body>

<div class="page">

  <header class="masthead">
    <div class="mark"><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></div>
    <nav class="nav" aria-label="Primary">
      <a href="{{ "/" | relURL }}"{{ if or .IsHome (eq .Section "posts") }} class="here"{{ end }}>posts</a>
      <a href="{{ "/work/" | relURL }}"{{ if eq .RelPermalink "/work/" }} class="here"{{ end }}>work</a>
      <a href="{{ "/life/" | relURL }}"{{ if eq .RelPermalink "/life/" }} class="here"{{ end }}>life</a>
      <a href="{{ "/contact/" | relURL }}"{{ if eq .RelPermalink "/contact/" }} class="here"{{ end }}>contact</a>
      <button class="toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg><svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  {{ block "main" . }}{{ end }}

  <footer class="foot">
    <div>&copy; {{ now.Format "2006" }} Alexander James King</div>
  </footer>

</div>

<script src="{{ "/site.js" | relURL }}"></script>
{{ block "scripts" . }}{{ end }}
</body>
</html>
